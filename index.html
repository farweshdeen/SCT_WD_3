<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="favicon-icon.jpg">
  </head>
  <body>
    <main class="game-shell">
      <section class="game-card" aria-labelledby="game-title">
        <h1 id="game-title">Tic-Tac-Toe</h1>
        <p class="status" id="status" aria-live="polite">Player X's turn</p>

        <div class="player-indicator" aria-label="Current player indicator">
          <span class="player-pill active" data-player="X">X</span>
          <span class="player-pill" data-player="O">O</span>
        </div>

        <div class="scoreboard" aria-label="Scoreboard">
          <div class="score-box">
            <span class="score-label">Player X</span>
            <strong id="score-x">0</strong>
          </div>
          <div class="score-box">
            <span class="score-label">Draws</span>
            <strong id="score-draws">0</strong>
          </div>
          <div class="score-box">
            <span class="score-label">Player O</span>
            <strong id="score-o">0</strong>
          </div>
        </div>

        <div class="board" role="grid" aria-label="Tic Tac Toe board">
          <button class="cell" data-index="0" aria-label="Cell 1"></button>
          <button class="cell" data-index="1" aria-label="Cell 2"></button>
          <button class="cell" data-index="2" aria-label="Cell 3"></button>
          <button class="cell" data-index="3" aria-label="Cell 4"></button>
          <button class="cell" data-index="4" aria-label="Cell 5"></button>
          <button class="cell" data-index="5" aria-label="Cell 6"></button>
          <button class="cell" data-index="6" aria-label="Cell 7"></button>
          <button class="cell" data-index="7" aria-label="Cell 8"></button>
          <button class="cell" data-index="8" aria-label="Cell 9"></button>
        </div>

        <button class="restart-btn" id="restart-btn" type="button">Restart Game</button>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
